<style>
    .typing-indicator { display: flex; align-items: center; gap: 4px; }
    .typing-indicator span {
        width: 8px; height: 8px; background-color: #a5b4fc; border-radius: 50%;
        animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1.0); }
    }
    .toggle-switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
        background-color: #4b5563;
        border-radius: 34px;
        transition: background-color 0.2s;
        -webkit-appearance: none;
        appearance: none;
        outline: none;
        cursor: pointer;
    }
    .toggle-switch::before {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        border-radius: 50%;
        transition: transform 0.2s;
    }
    .toggle-switch:checked {
        background-color: #4f46e5;
    }
    .toggle-switch:checked::before {
        transform: translateX(20px);
    }
    /* UI Polish: Added subtle button animations */
    button {
        transition: transform 0.1s ease-in-out, background-color 0.2s, border-color 0.2s;
    }
    button:active {
        transform: scale(0.97);
    }

    /* Animated Gradient Background for Landing Page Hero */
    .hero-bg {
        background: linear-gradient(-45deg, #4f46e5, #7c3aed, #1e1b4b, #111827);
        background-size: 400% 400%;
        animation: gradient-animation 15s ease infinite;
        position: relative;
        overflow: hidden;
    }
    .hero-bg::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 20px 20px;
        opacity: 0.5;
    }
    @keyframes gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    
    /* New Landing Page Styles */
    .typing-cursor {
        display: inline-block;
        width: 3px;
        height: 1em;
        background-color: #a78bfa;
        margin-left: 8px;
        animation: blink 1s infinite;
    }
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    .fade-in-section {
      opacity: 0;
      transform: translateY(20px);
      visibility: hidden;
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      will-change: opacity, visibility, transform;
    }
    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }
    .glass-card {
        background: rgba(30, 41, 59, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* Visual Editor Styles */
    .visual-editor-command-bar {
        position: fixed;
        z-index: 51; /* Higher than header (40) and sidebar (50) */
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(71, 85, 105, 0.7);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 280px;
        animation: fade-in-up 0.3s ease-out;
    }
    @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* New Google Chat UI Styles */
    .ai-chat-container {
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        height: 100%;
        overflow-y: auto;
    }
    .ai-message-block {
        display: flex;
        flex-direction: column;
        max-width: 85%;
    }
    .ai-message-block.user {
        align-self: flex-end;
        align-items: flex-end;
    }
    .ai-message-block.bot {
        align-self: flex-start;
        align-items: flex-start;
    }
    .ai-message {
        padding: 0.625rem 1rem;
        border-radius: 1.25rem;
        line-height: 1.5;
        font-size: 0.9rem;
        word-wrap: break-word;
    }
    .ai-message.user {
        background: #1a73e8;
        color: white;
        border-bottom-right-radius: 0.5rem;
    }
    .ai-message.bot {
        background: #3c4043;
        color: #e8eaed;
        border-bottom-left-radius: 0.5rem;
    }
    /* Inverted Theme */
    body.theme-inverted { background-color: #f3f4f6 !important; color: #1f2937 !important; }
    body.theme-inverted .bg-gray-900, body.theme-inverted .bg-gray-900\/50, body.theme-inverted .bg-gray-900\/70, body.theme-inverted .bg-slate-900 { background-color: #f9fafb !important; }
    body.theme-inverted .bg-slate-800, body.theme-inverted .bg-slate-800\/30, body.theme-inverted .bg-slate-800\/50, body.theme-inverted .bg-slate-800\/70, body.theme-inverted .bg-slate-800\/80, body.theme-inverted .bg-slate-800\/90 { background-color: #e5e7eb !important; }
    /* Changelog Styles */
    .changelog-badge {
        display: inline-block;
        padding: 2px 8px;
        font-size: 0.75rem; /* 12px */
        line-height: 1rem; /* 16px */
        font-weight: 600;
        border-radius: 9999px;
        flex-shrink: 0;
        margin-top: 4px;
    }
    .changelog-badge-new { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; } /* blue */
    .changelog-badge-improved { background-color: rgba(168, 85, 247, 0.2); color: #c084fc; } /* purple */
    .changelog-badge-fixed { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; } /* green */

    /* New Software IDE Styles */
    .side-ide-main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
    }
    .side-ide-code-tabs {
        flex-shrink: 0;
        display: flex;
        background-color: #1e293b; /* slate-800 */
        border-bottom: 1px solid #334155; /* slate-700 */
        overflow-x: auto;
    }
    .side-ide-code-tab {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        color: #94a3b8; /* slate-400 */
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-left: 1px solid #334155;
        white-space: nowrap;
    }
    .side-ide-code-tab:first-child {
        border-left: none;
    }
    .side-ide-code-tab.active {
        background-color: #0f172a; /* slate-900 */
        color: white;
    }
    .side-ide-code-editor {
        flex-grow: 1;
        background-color: #0d1117;
        overflow: auto;
        padding: 1rem;
        font-family: monospace;
        font-size: 0.875rem;
        color: #cbd5e1; /* slate-300 */
        white-space: pre;
    }
    .side-ide-command-bar {
        flex-shrink: 0;
        padding: 1rem;
        background-color: rgba(30, 41, 59, 0.8); /* slate-800/80 */
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border-top: 1px solid #334155;
    }

    /* Redesigned Dashboard Styles */
    .project-card {
        position: relative;
        overflow: hidden;
        background: #1e293b; /* slate-800 */
        border: 1px solid #334155; /* slate-700 */
        border-radius: 1rem;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .project-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        border-color: #4f46e5; /* indigo-600 */
    }
    .project-card-glow {
        position: absolute;
        top: 0;
        left: 0;
        width: 200%;
        height: 100%;
        background: radial-gradient(circle at 50% 0, rgba(79, 70, 229, 0.2), transparent 40%);
        transform: translateX(-50%);
        opacity: 0;
        transition: opacity 0.4s ease;
    }
    .project-card:hover .project-card-glow {
        opacity: 1;
    }
    .progress-bar-bg {
        background-color: #334155; /* slate-700 */
        border-radius: 9999px;
        height: 6px;
        overflow: hidden;
    }
    .progress-bar-fg {
        background: linear-gradient(to right, #4f46e5, #818cf8);
        height: 100%;
        border-radius: 9999px;
        transition: width 0.5s ease-out;
    }
    .kebab-menu-dropdown {
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        background-color: #1e293b; /* slate-800 */
        border: 1px solid #475569; /* slate-600 */
        border-radius: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        padding: 0.5rem;
        z-index: 20;
        min-width: 160px;
        animation: fade-in-up 0.2s ease-out;
    }
    .list-view-item {
        display: flex;
        align-items: center;
        padding: 1rem;
        background-color: #1e293b; /* slate-800 */
        border: 1px solid #334155; /* slate-700 */
        border-radius: 0.75rem;
        transition: background-color 0.2s, border-color 0.2s;
    }
    .list-view-item:hover {
        background-color: #334155; /* slate-700 */
        border-color: #4f46e5;
    }
    .status-indicator { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* File Converter IDE Styles */
    .ide-container {
        display: flex;
        height: 100%;
        width: 100%;
    }
    .ide-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-color: #1e293b; /* slate-800 */
        border-left: 1px solid #334155; /* slate-700 */
    }
    .ide-panel:first-child {
        border-left: none;
    }
    .ide-file-list {
        flex-grow: 1;
        overflow-y: auto;
        padding: 0.5rem;
    }
    .ide-file-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.75rem;
        border-radius: 0.375rem;
        cursor: pointer;
        font-size: 0.875rem;
        color: #cbd5e1; /* slate-300 */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ide-file-item:hover {
        background-color: #334155; /* slate-700 */
    }
    .ide-file-item.active {
        background-color: #4f46e5; /* indigo-600 */
        color: white;
    }
    .ide-editor {
        flex-grow: 1;
        background-color: #0d1117;
        color: #cbd5e1;
        font-family: monospace;
        font-size: 0.875rem;
        padding: 1rem;
        border: none;
        outline: none;
        resize: none;
        white-space: pre;
    }
</style>
